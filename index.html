/* ================= SETTINGS: SYNC CARD ================= */
const _settingsWithLic=VIEWS.settings;
VIEWS.settings=async function(){
  const base=await _settingsWithLic();
  await SYNC.load();
  const on=SYNC.configured();
  const embedded=!!(CONFIG.SUPABASE_URL&&CONFIG.SUPABASE_ANON);
  const stMap={off:['gray',t('stOff')],connecting:['amber',t('stConnecting')],synced:['green',t('stSynced')],
    syncing:['amber',t('stSyncing')],offline:['amber',t('stOffline')],error:['red',t('stError')]};
  const stv=stMap[SYNC.status]||stMap.off;
  const lastTxt=SYNC.lastSync?fmtDate(new Date(SYNC.lastSync).toISOString())+' '+fmtTime(new Date(SYNC.lastSync).toISOString()):t('never');
  const cfg=SYNC.cfg||{};
  let inner;
  if(embedded){
    // Auto-sync mode: sync is bound to activation, no manual entry needed.
    if(on){
      inner=`
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="kpi k2" style="padding:12px"><div class="kpi-label">${t('storeId')}</div><div class="kpi-val" style="font-size:13px;word-break:break-all">${esc(cfg.storeId||'')}</div></div>
        <div class="kpi k1" style="padding:12px"><div class="kpi-label">${t('lastSync')}</div><div class="kpi-val" style="font-size:13px">${lastTxt}</div></div>
      </div>
      <button class="btn primary" onclick="SYNC.fullSync()">${icon('swap',15)} ${t('syncNow')}</button>`;
    }else{
      inner=`<div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;font-size:13px;color:var(--text2);line-height:1.7">${t('syncAutoHint')}</div>`;
    }
  }else{
    // Manual mode (seller left SUPABASE_URL blank)
    inner=on?`
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="kpi k2" style="padding:12px"><div class="kpi-label">${t('storeId')}</div><div class="kpi-val" style="font-size:13px;word-break:break-all">${esc(cfg.storeId||'')}</div></div>
        <div class="kpi k1" style="padding:12px"><div class="kpi-label">${t('lastSync')}</div><div class="kpi-val" style="font-size:13px">${lastTxt}</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn primary" onclick="SYNC.fullSync()">${icon('swap',15)} ${t('syncNow')}</button>
        <button class="btn danger" onclick="A.syncDisconnect()">${icon('x',15)} ${t('syncDisconnect')}</button>
      </div>`
    :`
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--text2);margin-bottom:14px;line-height:1.9">
        ${t('syncStep1')}<br>${t('syncStep2')}<br>${t('syncStep3')}
      </div>
      <button class="btn primary" onclick="A.syncConnectForm()">${icon('swap',15)} ${t('syncConnect')}</button>`;
  }
  const syncCard=`
  <div class="card" style="margin-bottom:16px"><div class="card-h"><div class="card-t">${icon('swap',18)} ${t('syncSettings')}</div><span class="bdg ${stv[0]}" id="syncStatusBadge">${stv[1]}</span></div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.6">${t('syncDesc')}</div>
    ${inner}
  </div>`;
  return base.replace('<div class="card" style="text-align:center;color:var(--muted)',syncCard+'\n<div class="card" style="text-align:center;color:var(--muted)');
};

A.syncConnectForm=function(){
  const cfg=SYNC.cfg||{};
  openModal({title:t('syncConnect'),wide:true,body:
    '<div style="background:linear-gradient(90deg,rgba(245,165,36,.14),rgba(244,80,108,.12));border:1px solid rgba(245,165,36,.3);border-radius:11px;padding:11px 13px;font-size:12px;color:#f5a524;margin-bottom:14px;line-height:1.6">'+t('syncSecretWarn')+'</div>'
    +'<div style="color:var(--muted);font-size:12.5px;margin-bottom:12px">'+t('syncSameCreds')+'</div>'
    +'<div class="form-grid">'
    +F.inp('sy_url',t('supaUrl'),{val:cfg.url||'',ph:'https://xxxxx.supabase.co',full:1})
    +F.inp('sy_key',t('supaKey'),{val:cfg.anonKey||'',ph:'eyJhbGci...',full:1})
    +F.inp('sy_store',t('storeId'),{val:cfg.storeId||'',ph:t('storeIdPh')})
    +F.inp('sy_secret',t('storeSecret'),{val:cfg.secret||'',ph:t('secretPh')})
    +'</div>',
    footer:'<button class="btn ghost" onclick="closeModal()">'+t('cancel')+'</button><button class="btn primary" id="syncGo">'+icon('swap',16)+' '+t('syncConnect')+'</button>',
    onOpen:()=>{$('syncGo').onclick=async()=>{
      const url=F.v('sy_url').replace(/\/$/,''), anonKey=F.v('sy_key'), storeId=F.v('sy_store').trim(), secret=F.v('sy_secret');
      if(!url||!anonKey||!storeId||!secret){toast(t('syncFields'),'err');return}
      const btn=$('syncGo');btn.disabled=true;btn.textContent=t('stConnecting');
      try{
        await SYNC.connect({url,anonKey,storeId,secret});
        closeModal();toast(t('syncConnected'));
        await SYNC.start();
        A.render();
      }catch(e){
        btn.disabled=false;btn.innerHTML=icon('swap',16)+' '+t('syncConnect');
        toast(e.message==='AUTH'?t('syncAuthErr'):t('syncErr'),'err');
      }
    }}});
};

      footer:'<button class="btn ghost" id="wcEmpty">'+t('startEmpty')+'</button><button class="btn primary" id="wcDemo">'+icon('sparkles',15)+' '+t('loadDemo')+'</button>',
      onOpen:()=>{
